<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>дә’еҠЁеҸӨж–Үпјҡж»Ҙз«Ҫе……ж•° В· йҹ©йқһеӯҗ (дёӯиӢұеҸҢиҜӯВ·иҜҚи§ЈзүҲ)</title>
    
    <link rel="stylesheet" href="classic_style.css">
    
    <script src="lanyuchongshu_text.js"></script>
    <script src="lanyuchongshu_translation.js"></script>
    <script src="lanyuchongshu_analysis.js"></script>
    <script src="lanyuchongshu_quiz.js"></script>
    <script src="lanyuchongshu_shortq.js"></script>
</head>
<body>
 
<div class="app-container">
    <div class="header-section">
        <h1 class="title">ж»Ҙз«Ҫе……ж•°</h1>
        <p class="author">гҖҠйҹ©йқһеӯҗВ·еҶ…еӮЁиҜҙдёҠгҖӢ / йҹ©йқһ (жҲҳеӣҪ)</p>
    </div>
    
    <div class="poem-container">
        <div id="dynamic-poem-container"></div>
        
        <div class="translation-block" id="translationBlock">
            <div class="translation-header" id="translationHeader">
                <div class="translation-title"><span>рҹ“–</span> зҷҪиҜқзҝ»иҜ‘</div>
                <div class="toggle-icon" id="toggleIcon">в–¶</div>
            </div>
            <div class="translation-content" id="translationContent"></div>
        </div>
    </div>
    
    <div class="controls-wrapper">
        <div class="control-panel"><div class="control-label">рҹ—ЈпёҸ жӢјйҹіиҫ…еҠ© <span>(Pinyin)</span></div><label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label></div>
        <div class="control-panel"><div class="control-label">рҹ”Ө иӢұж–Үиҫ…еҠ© <span>(English)</span></div><label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label></div>
    </div>

    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn"><span class="btn-icon">рҹ“ң</span> еұ•ејҖе…ЁиҜ—иөҸжһҗ</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn"><span class="btn-icon">рҹҺҜ</span> е®ўи§ӮйўҳиҮӘжөӢ</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn"><span class="btn-icon">вңҚпёҸ</span> з®Җзӯ”йўҳзү№и®ӯ</button>
    </div>
 
    <div class="collapsible-content" id="analysis-content"></div>
    <div class="collapsible-content" id="quiz-content"><div id="quiz-dynamic-container"></div></div>
    <div class="collapsible-content" id="shortq-content"></div>
</div>
 
<div class="floating-tooltip" id="tooltip">
    <div class="exp-header"><span class="exp-word" id="disp-word"></span><span class="exp-pinyin" id="disp-pinyin"></span><span class="exam-tag" id="exam-tag">иҖғзӮ№</span></div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>

<div id="debug-checker-panel" style="display: none; max-width: 850px; margin: 50px auto 20px auto; padding: 25px; background: #fffbeb; border: 2px dashed #f59e0b; border-radius: 12px; font-family: system-ui, sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fde68a; padding-bottom: 12px; margin-bottom: 15px;">
        <h3 style="color: #b45309; margin: 0; display: flex; align-items: center; gap: 8px;">рҹӣ пёҸ й«ҳзә§иҜҚз»„еҲҶеқ—ж•°жҚ®еҸҜи§ҶеҢ–жөӢиҜ•йқўжқҝ</h3>
        <p style="font-size: 12px; color: #92400e; margin: 0;">еҪ“еүҚж•°жҚ®е·ІйҖҡиҝҮй«ҳзә§иҜҚз»„еқ—жӯ»з»‘е®ҡйӘҢиҜҒпјҢйӣ¶й”ҷдҪҚзәўеҲ©йҖҡиҪҰдёӯпјҒ</p>
    </div>
    <div id="debug-grid-container"></div>
</div>
 
<script>
    let originalQuizQuestions = [];

    // рҹҺҜгҖҗй«ҳйҳ¶иҜҚз»„еқ—жӯ»з»‘е®ҡеј•ж“ҺгҖ‘пјҡ100% дјҳйӣ…и§ЈжһҗиҜҚз»„з»“жһ„пјҢйҒҮеҲ°еӯ—з¬ҰдёІж ҮзӮ№е®ҢзҫҺеҢ…иЈ№пјҢиҮӘеҠЁдёәиӢұж–Үз•ҷз©ә
    function renderGridData(dataArray) {
        if (!dataArray || !Array.isArray(dataArray)) return '';
        let html = '';
        for (let item of dataArray) {
            if (typeof item === 'string') {
                const tokens = item.match(/[a-zA-ZДҒГЎЗҺГ Д“Г©ДӣГЁД«ГӯЗҗГ¬ЕҚГіЗ’ГІЕ«ГәЗ”Г№ГјЗ–ЗҳЗҡЗң]+|[пјҢгҖӮпјҹпјҒпјҡвҖңвҖқвҖҳвҖҷпјҲпјүгҖҠгҖӢгҖҒ\-\:пјӣвҖ”\(\)вҶ’0-9\.вҖҰ\/]|[\s\u3000]/g) || [item];
                for (let t of tokens) {
                    html += `<span class="punctuation">${t}</span>`;
                }
            } else if (typeof item === 'object' && item.w) {
                const p = item.p || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${item.w}</span></span>`;
            }
        }
        return html;
    }

    // з»Ҹе…ёж–Үжң¬й•ҝдёІе…ңеә•жӢҶи§Јеј•ж“ҺпјҲе…је®№еҸӨж–ҮеҺҹж–Үе’Ңдј з»ҹиҜҫж–Үпјү
    function alignText(zh, py) {
        if (!zh) return '';
        const tokens = zh.match(/[a-zA-ZДҒГЎЗҺГ Д“Г©ДӣГЁД«ГӯЗҗГ¬ЕҚГіЗ’ГІЕ«ГәЗ”Г№ГјЗ–ЗҳЗҡЗң]+|[\u4e00-\u9fa5]|[пјҢгҖӮпјҹпјҒпјҡвҖңвҖқвҖҳвҖҷпјҲпјүгҖҠгҖӢгҖҒ\-\:пјӣвҖ”\(\)вҶ’0-9\.вҖҰ\/]|[\s\u3000]/g) || [];
        const pys = py ? py.trim().split(/\s+/) : [];
        let pIdx = 0;
        let html = '';
        for (let t of tokens) {
            if (/[пјҢгҖӮпјҹпјҒпјҡвҖңвҖқвҖҳвҖҷпјҲпјүгҖҠгҖӢгҖҒ\-\:пјӣвҖ”\(\)вҶ’\s0-9\.вҖҰ\/a-zA-ZДҒГЎЗҺГ Д“Г©ДӣГЁД«ГӯЗҗГ¬ЕҚГіЗ’ГІЕ«ГәЗ”Г№ГјЗ–ЗҳЗҡЗң\u3000]/.test(t)) {
                html += `<span class="punctuation">${t}</span>`;
            } else {
                const p = pys[pIdx] || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${t}</span></span>`;
                pIdx++;
            }
        }
        return html;
    }

    function alignTextWithPrefix(prefix, zh, py) {
        if (!zh) return '';
        const tokens = zh.match(/[a-zA-ZДҒГЎЗҺГ Д“Г©ДӣГЁД«ГӯЗҗГ¬ЕҚГіЗ’ГІЕ«ГәЗ”Г№ГјЗ–ЗҳЗҡЗң]+|[\u4e00-\u9fa5]|[пјҢгҖӮпјҹпјҒпјҡвҖңвҖқвҖҳвҖҷпјҲпјүгҖҠгҖӢгҖҒ\-\:пјӣвҖ”\(\)вҶ’0-9\.вҖҰ\/]|[\s\u3000]/g) || [];
        const pys = py ? py.trim().split(/\s+/) : [];
        let html = '';
        html += `<span class="char-box" style="margin-right: 8px !important;"><span class="py-text">&nbsp;</span><span class="zh-text" style="font-weight: bold; color: #1e293b;">${prefix}</span></span>`;
        let pIdx = 0;
        for (let t of tokens) {
            if (/[EpicпјҢгҖӮпјҹпјҒпјҡвҖңвҖқвҖҳвҖҷпјҲпјүгҖҠгҖӢгҖҒ\-\:пјӣвҖ”\(\)вҶ’\s0-9\.вҖҰ\/a-zA-ZДҒГЎЗҺГ Д“Г©ДӣГЁД«ГӯЗҗГ¬ЕҚГіЗ’ГІЕ«ГәЗ”Г№ГјЗ–ЗҳЗҡЗң\u3000]/.test(t)) {
                html += `<span class="punctuation">${t}</span>`;
            } else {
                const p = pys[pIdx] || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${t}</span></span>`;
                pIdx++;
            }
        }
        return html;
    }

    // рҹҺҜ еҹәзЎҖжҙ—зүҢз®—жі•е·Ҙе…·еҮҪж•°
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // рҹӣ пёҸ иҖҒеёҲдё“з”Ёеҝ«жҚ·жҺ’жҹҘйқўжқҝ
    function renderDebugGrid() {
        const container = document.getElementById('debug-grid-container');
        if (!container || typeof translationData === 'undefined') return;
        let html = '<div style="display: flex; flex-wrap: wrap; gap: 6px; background: #ffffff; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">';
        translationData.forEach((item, docIdx) => {
            let dataList = Array.isArray(item.zhStructure) ? item.zhStructure : [];
            dataList.forEach(part => {
                if (typeof part === 'object' && part.w) {
                    html += `<div style="display: inline-flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 4px 6px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 4px;"><span style="font-size: 10px; color: #2563eb; font-weight: bold;">${part.p}</span><span style="font-size: 14px; font-weight: bold; color: #1e293b;">${part.w}</span></div>`;
                } else {
                    html += `<div style="display: inline-flex; align-items: center; justify-content: center; padding: 4px 6px; background: #f8fafc; border: 1px dashed #e2e8f0; border-radius: 4px; font-weight: bold; color:#64748b;">${part}</div>`;
                }
            });
        });
        html += '</div>'; container.innerHTML = html;
    }

    window.onload = function() {
        if (typeof quizQuestions !== 'undefined') { originalQuizQuestions = JSON.parse(JSON.stringify(quizQuestions)); }
        renderPoem(); renderTranslation(); renderAnalysis(); renderShortQ(); renderQuizCards(); initInteractions(); renderDebugGrid();
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'm' || e.key === 'M')) {
                e.preventDefault(); const panel = document.getElementById('debug-checker-panel');
                if (panel.style.display === 'none') { panel.style.display = 'block'; panel.scrollIntoView({ behavior: 'smooth' }); } else { panel.style.display = 'none'; }
            }
        });
    };

    function renderPoem() {
        const container = document.getElementById('dynamic-poem-container');
        let html = '<div class="poem-paragraph">&emsp;&emsp;'; 
        poemData.forEach(w => {
            if(w.punc) { html += `<span class="punctuation">${w.text.trim()}</span>`; } else {
                let examClass = w.exam ? ' word exam-focus' : ' word'; let examAttr = w.exam ? ' data-exam="true"' : '';
                html += `<span class="${examClass}" data-text="${w.text.trim()}" data-pinyin="${w.py}" data-zh="${w.zh}" data-en="${w.en}"${examAttr}>${alignText(w.text, w.py)}</span>`;
            }
        });
        html += '</div>'; container.innerHTML = html;
    }

    function renderTranslation() {
        const container = document.getElementById('translationContent');
        let html = '';
        translationData.forEach((item, index) => {
            if(index > 0) html += '<div class="trans-divider"></div>';
            let zhContent = Array.isArray(item.zhStructure) ? renderGridData(item.zhStructure) : alignText(item.zh, item.py);
            html += `<div class="trans-text-line"><div class="trans-zh">${zhContent}</div><div class="trans-en">${item.en}</div></div>`;
        });
        container.innerHTML = html;
    }

    function renderAnalysis() {
        const container = document.getElementById('analysis-content');
        let html = '';
        analysisData.forEach(item => {
            html += `<div class="analysis-card"><div class="ana-title-group"><h4 class="ana-header">${alignText(item.header, item.headerPy)}</h4><div class="ana-en">${item.en}</div></div><div class="ana-text-group"><p class="ana-zh">${alignText(item.textZh, item.textPy)}</p><div class="ana-en">${item.textEn}</div></div></div>`;
        });
        container.innerHTML = html;
    }

    function renderShortQ() {
        const container = document.getElementById('shortq-content');
        if (!container) return;
        let html = '';
        shortQData.forEach(item => {
            let strategyZhHtml = '';
            if (Array.isArray(item.sZhStructure)) {
                item.sZhStructure.forEach((stepArray, lineIdx) => {
                    if(lineIdx > 0) strategyZhHtml += '<br>';
                    strategyZhHtml += `<span class="strategy-step-line">${renderGridData(stepArray)}</span>`;
                });
            } else {
                item.sZh.forEach((lineText, lineIdx) => {
                    if(lineIdx > 0) strategyZhHtml += '<br>';
                    const linePy = item.sPy && item.sPy[lineIdx] ? item.sPy[lineIdx] : '';
                    strategyZhHtml += `<span class="strategy-step-line">${alignText(lineText, linePy)}</span>`;
                });
            }

            let answerZhContent = Array.isArray(item.aZhStructure) ? renderGridData(item.aZhStructure) : alignText(item.aZh, item.aPy);

            html += `
                <div class="sa-card">
                    <div class="sa-q-header">
                        <div class="sa-q-num-box"><span class="sa-q-num">${item.id}</span></div>
                        <div class="q-text-group">
                            <h4 class="q-zh">${Array.isArray(item.qZhStructure) ? renderGridData(item.qZhStructure) : alignText(item.qZh, item.qPy)}</h4>
                        </div>
                    </div>
                    <div class="q-en">${item.qEn}</div>
                    <div class="strategy-box">
                        <div class="strategy-title">рҹ’Ў зӯ”йўҳжҖқи·Ҝ</div>
                        <div class="strategy-zh" style="display: block !important; line-height: 2.6 !important;">${strategyZhHtml}</div>
                        <div class="strategy-en">${item.sEn}</div>
                    </div>
                    <button class="sa-answer-btn" onclick="toggleAnswer(this)">рҹ“– зӮ№еҮ»жҹҘзңӢж ҮеҮҶзӯ”жЎҲ</button>
                    <div class="sa-answer-box">
                        <div class="sa-model-answer">
                            <div class="sa-badge">ж ҮеҮҶзӯ”жЎҲ</div>
                            <div class="sa-zh">${answerZhContent}</div>
                            <div class="sa-en">${item.aEn}</div>
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }
    
    function renderQuizCards() {
        const container = document.getElementById('quiz-dynamic-container');
        if (!container || originalQuizQuestions.length === 0) return;
        container.innerHTML = '';
        const currentQuestions = JSON.parse(JSON.stringify(originalQuizQuestions));
        
        currentQuestions.forEach(q => {
            shuffleArray(q.options); 
            const card = document.createElement('div');
            card.className = 'quiz-card'; card.setAttribute('data-qid', q.id);
            let optionsHtml = ''; const letters = ['A.', 'B.', 'C.', 'D.'];
            
            q.options.forEach((opt, idx) => {
                const optLetter = letters[idx];
                let optZhContent = Array.isArray(opt.textStructure) ? renderGridData(opt.textStructure) : alignText(opt.text, opt.py);
                
                optionsHtml += `
                    <button class="option-btn" data-correct="${opt.correct}" data-opt-id="${idx}">
                        <div class="opt-zh">
                            <span class="char-box" style="margin-right: 8px !important;"><span class="py-text">&nbsp;</span><span class="zh-text" style="font-weight: bold; color: #1e293b;">${optLetter}</span></span>${optZhContent}
                        </div>
                        <div class="quiz-option-en">${opt.en}</div>
                    </button>`;
            });
            
            let qTitleContent = Array.isArray(q.textStructure) ? renderGridData(q.textStructure) : alignText(q.text, q.py);
            card.innerHTML = `<div class="question-header"><div class="q-zh-wrapper"><span class="char-box" style="margin-right: 8px !important;"><span class="py-text">&nbsp;</span><span class="zh-text" style="font-weight: bold; color: #1e293b;">${q.id}.</span></span>${qTitleContent}</div><div class="q-en">${q.en}</div></div><div class="options-area">${optionsHtml}</div><div class="feedback"></div>`;
            container.appendChild(card);
            
            const optsDiv = card.querySelector('.options-area'); const btns = optsDiv.querySelectorAll('.option-btn'); const fbDiv = card.querySelector('.feedback');
            btns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    if (this.disabled) return;
                    const optId = parseInt(this.getAttribute('data-opt-id'));
                    const optData = q.options[optId]; 
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    const correctBtn = Array.from(btns).find(b => b.getAttribute('data-correct') === 'true');
                    const correctOptId = parseInt(correctBtn.getAttribute('data-opt-id'));
                    const correctOptData = q.options[correctOptId];
                    
                    btns.forEach(b => b.disabled = true);
                    
                    let wrongExpHtml = Array.isArray(optData.explanationStructure) ? renderGridData(optData.explanationStructure) : alignText(optData.explanation, optData.explanationPy);
                    let correctExpHtml = Array.isArray(correctOptData.explanationStructure) ? renderGridData(correctOptData.explanationStructure) : alignText(correctOptData.explanation, correctOptData.explanationPy);

                    if (isCorrect) {
                        this.classList.add('correct');
                        fbDiv.className = 'feedback success';
                        fbDiv.innerHTML = `<div class="fb-line"><span class="fb-label success-txt">вң… еӣһзӯ”жӯЈзЎ®пјҒ</span></div><div class="fb-line"><span class="fb-label">рҹ“– жӯЈзЎ®и§Јжһҗпјҡ</span><span class="fb-content">${correctExpHtml}</span></div><div class="fb-en">рҹ’¬ Correct Explanation: ${optData.explanationEn}</div>`;
                    } else {
                        this.classList.add('wrong');
                        fbDiv.className = 'feedback error';
                        fbDiv.innerHTML = `
                            <div class="fb-line"><span class="fb-label error-txt">вқҢ еӣһзӯ”й”ҷиҜҜгҖӮжӯЈзЎ®зӯ”жЎҲжҳҜпјҡ</span><span class="fb-content-main" style="display:inline-flex; align-items:center;">${letters[correctOptId]} ${correctOptData.text || ''}</span></div>
                            <div class="fb-en">рҹ’¬ Correct Answer: ${correctOptData.en}</div>
                            <div class="fb-line" style="margin-top: 8px;"><span class="fb-label">рҹ“– дҪ йҖүжӢ©зҡ„йҖүйЎ№и§Јжһҗпјҡ</span><span class="fb-content">${wrongExpHtml}</span></div>
                            <div class="fb-en">рҹ’¬ Your Choice Analysis: ${optData.explanationEn}</div>
                            <div class="fb-line" style="margin-top: 8px;"><span class="fb-label">рҹ“– жӯЈзЎ®йҖүйЎ№и§Јжһҗпјҡ</span><span class="fb-content">${correctExpHtml}</span></div>
                            <div class="fb-en">рҹ’¬ Correct Option Analysis: ${correctOptData.explanationEn}</div>`;
                    }
                });
            });
        });
    }

    function initInteractions() {
        const translationHeader = document.getElementById('translationHeader'); const translationContent = document.getElementById('translationContent'); const toggleIcon = document.getElementById('toggleIcon');
        translationHeader.addEventListener('click', function() { if (translationContent.classList.contains('show')) { translationContent.classList.remove('show'); toggleIcon.textContent = 'в–¶'; } else { translationContent.classList.add('show'); toggleIcon.textContent = 'в–ј'; } });
        const pinyinToggle = document.getElementById('pinyin-toggle'); const enToggle = document.getElementById('en-toggle');
        document.body.classList.add('hide-pinyin', 'hide-english');
        pinyinToggle.addEventListener('change', function() { if (this.checked) document.body.classList.remove('hide-pinyin'); else document.body.classList.add('hide-pinyin'); });
        enToggle.addEventListener('change', function() { if (this.checked) document.body.classList.remove('hide-english'); else document.body.classList.add('hide-english'); });
        const words = document.querySelectorAll('.word'); const tooltip = document.getElementById('tooltip'); const dispWord = document.getElementById('disp-word'); const dispPinyin = document.getElementById('disp-pinyin'); const dispZh = document.getElementById('disp-zh'); const dispEn = document.getElementById('disp-en'); const examTag = document.getElementById('exam-tag');
        words.forEach(word => {
            word.addEventListener('click', function(e) {
                e.stopPropagation(); words.forEach(w => w.classList.remove('active')); this.classList.add('active');
                dispWord.innerText = this.getAttribute('data-text'); dispPinyin.innerText = this.getAttribute('data-pinyin'); dispZh.innerHTML = `<strong>и§Јжһҗпјҡ</strong> ${this.getAttribute('data-zh')}`; dispEn.innerText = this.getAttribute('data-en'); examTag.style.display = (this.getAttribute('data-exam') === 'true') ? 'inline-block' : 'none';
                tooltip.style.display = 'block'; const rect = this.getBoundingClientRect(); tooltip.style.top = `${rect.top + window.scrollY - tooltip.offsetHeight - 20}px`; tooltip.style.left = `${rect.left + window.scrollX + rect.width/2}px`; setTimeout(() => tooltip.classList.add('show'), 10);
            });
        });
        document.addEventListener('click', function(e) { if (!tooltip.contains(e.target) && !e.target.closest('.word')) { tooltip.classList.remove('show'); words.forEach(w => w.classList.remove('active')); setTimeout(() => { if (!tooltip.classList.contains('show')) tooltip.style.display = 'none'; }, 300); } });
        const panels = [
            { btnId: 'toggle-analysis-btn', contentId: 'analysis-content', defaultHTML: '<span class="btn-icon">рҹ“ң</span> еұ•ејҖе…ЁиҜ—иөҸжһҗ', defaultBg: 'linear-gradient(135deg, #10b981, #059669)' },
            { btnId: 'toggle-quiz-btn', contentId: 'quiz-content', defaultHTML: '<span class="btn-icon">рҹҺҜ</span> е®ўи§ӮйўҳиҮӘжөӢ', defaultBg: 'linear-gradient(135deg, #3b82f6, #2563eb)' },
            { btnId: 'toggle-shortq-btn', contentId: 'shortq-content', defaultHTML: '<span class="btn-icon">вңҚпёҸ</span> з®Җзӯ”йўҳзү№и®ӯ', defaultBg: 'linear-gradient(135deg, #8b5cf6, #6d28d9)' }
        ];
        panels.forEach(panel => {
            const btn = document.getElementById(panel.btnId);
            btn.addEventListener('click', function() {
                const content = document.getElementById(panel.contentId); const isOpen = content.style.display === 'block';
                panels.forEach(p => { document.getElementById(p.contentId).style.display = 'none'; const pb = document.getElementById(p.btnId); pb.innerHTML = p.defaultHTML; pb.style.background = p.defaultBg; });
                if (!isOpen) { content.style.display = 'block'; btn.innerHTML = '<span class="btn-icon">в¬ҶпёҸ</span> ж”¶иө·еҪ“еүҚйқўжқҝе№¶йҮҚзҪ®йўҳзӣ®'; btn.style.background = '#64748b'; if (panel.btnId === 'toggle-quiz-btn') { renderQuizCards(); } } else { if (panel.btnId === 'toggle-quiz-btn') { renderQuizCards(); } }
            });
        });
    }

    function toggleAnswer(btn) { const answerBox = btn.nextElementSibling; if (answerBox.style.display === 'block') { answerBox.style.display = 'none'; btn.innerHTML = 'рҹ“– зӮ№еҮ»жҹҘзңӢж ҮеҮҶзӯ”жЎҲ'; } else { answerBox.style.display = 'block'; btn.innerHTML = 'рҹ“– ж”¶иө·зӯ”жЎҲ'; } }
</script>
</body>
