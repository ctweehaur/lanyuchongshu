<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动古文：滥竽充数 · 韩非子 (中英双语·词解版)</title>
    
    <link rel="stylesheet" href="classic_style.css">
    
    <script src="lanyuchongshu_text.js"></script>
    <script src="lanyuchongshu_translation.js"></script>
    <script src="lanyuchongshu_analysis.js"></script>
    <script src="lanyuchongshu_quiz.js"></script>
    <script src="lanyuchongshu_shortq.js"></script>
</head>
<body>
 
<div class="app-container">
    <div class="header-section">
        <h1 class="title">滥竽充数</h1>
        <p class="author">《韩非子·内储说上》 / 韩非 (战国)</p>
    </div>
    
    <div class="poem-container">
        <div id="dynamic-poem-container"></div>
        
        <div class="translation-block" id="translationBlock">
            <div class="translation-header" id="translationHeader">
                <div class="translation-title"><span>📖</span> 白话翻译</div>
                <div class="toggle-icon" id="toggleIcon">▶</div>
            </div>
            <div class="translation-content" id="translationContent"></div>
        </div>
    </div>
    
    <div class="controls-wrapper">
        <div class="control-panel"><div class="control-label">🗣️ 拼音辅助 <span>(Pinyin)</span></div><label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label></div>
        <div class="control-panel"><div class="control-label">🔤 英文辅助 <span>(English)</span></div><label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label></div>
    </div>

    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn"><span class="btn-icon">📜</span> 展开全诗赏析</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn"><span class="btn-icon">🎯</span> 客观题自测</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn"><span class="btn-icon">✍️</span> 简答题特训</button>
    </div>
 
    <div class="collapsible-content" id="analysis-content"></div>
    <div class="collapsible-content" id="quiz-content"><div id="quiz-dynamic-container"></div></div>
    <div class="collapsible-content" id="shortq-content"></div>
</div>
 
<div class="floating-tooltip" id="tooltip">
    <div class="exp-header"><span class="exp-word" id="disp-word"></span><span class="exp-pinyin" id="disp-pinyin"></span><span class="exam-tag" id="exam-tag">考点</span></div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>

<!-- 🎯【隐藏式格子对照面板】：默认 display: none 彻底隐藏，学生在网页上什么都看不到 -->
<div id="debug-checker-panel" style="display: none; max-width: 800px; margin: 50px auto 20px auto; padding: 20px; background: #fffbeb; border: 2px dashed #f59e0b; border-radius: 12px; font-family: system-ui, sans-serif;">
    <h3 style="color: #b45309; margin-top: 0; display: flex; align-items: center; gap: 8px;">🔍 5大工具包 1:1 独立格子全盘排查面板 (老师隐藏模式)</h3>
    <p style="font-size: 13px; color: #78350f; margin-bottom: 15px;">当前为隐藏调试模式。只要各版块汉字与拼音块上下对齐，无红色“缺音”或“多余音”警报，即可安全发布给全马学生使用！</p>
    <div id="debug-grid-container"></div>
</div>
 
<script>
    let originalQuizQuestions = [];

    function alignText(zh, py) {
        if (!zh) return '';
        const tokens = zh.match(/[a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùüǖǘǚǜ]+|[\u4e00-\u9fa5]|[，。？！：“”喧’（）《》、\-\:；—\(\)→0-9\.…\/]|[\s\u3000]/g) || [];
        const pys = py ? py.trim().split(/\s+/) : [];
        let pIdx = 0;
        let html = '';
        
        for (let t of tokens) {
            if (/[，。？！：“”‘’（）《》、\-\:；—\(\)→\s0-9\.…\/a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùüǖǘǚǜ\u3000]/.test(t)) {
                html += `<span class="punctuation">${t}</span>`;
            } else {
                const p = pys[pIdx] || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${t}</span></span>`;
                pIdx++;
            }
        }
        return html;
    }

    function alignTextWithPrefix(prefix, zh, py) {
        if (!zh) return '';
        const tokens = zh.match(/[a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùüǖǘǚǜ]+|[\u4e00-\u9fa5]|[，。？！：“”‘’（）《》、\-\:；—\(\)→0-9\.…\/]|[\s\u3000]/g) || [];
        const pys = py ? py.trim().split(/\s+/) : [];
        let html = '';
        html += `<span class="char-box" style="margin-right: 8px !important;"><span class="py-text">&nbsp;</span><span class="zh-text" style="font-weight: bold; color: #1e293b;">${prefix}</span></span>`;
        let pIdx = 0;
        
        for (let t of tokens) {
            if (/[Epic，。？！：“”‘’（）《》、\-\:；—\(\)→\s0-9\.…\/a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùüǖǘǚǜ\u3000]/.test(t)) {
                html += `<span class="punctuation">${t}</span>`;
            } else {
                const p = pys[pIdx] || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${t}</span></span>`;
                pIdx++;
            }
        }
        return html;
    }

    function renderDebugGrid() {
        const container = document.getElementById('debug-grid-container');
        if (!container) return;
        
        let html = '';

        function makeGridHtml(title, zhText, pyText) {
            let res = `<div style="margin: 15px 0 6px 0; font-weight: bold; color: #334155; font-size: 13px;">📌 ${title}：</div>`;
            res += `<div style="display: flex; flex-wrap: wrap; gap: 5px; background: #ffffff; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; line-height: 1 !important;">`;
            
            const tokens = zhText.match(/[a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùüǖǘǚǜ]+|[\u4e00-\u9fa5]|[，。？！：“”‘’（）《》、\-\:；—\(\)→0-9\.…\/]|[\s\u3000]/g) || [];
            const pys = pyText ? pyText.trim().split(/\s+/) : [];
            
            let pIdx = 0;
            for (let i = 0; i < tokens.length || pIdx < pys.length; i++) {
                if (i >= tokens.length && pIdx >= pys.length) break;
                const t = tokens[i] || '';
                const isPunc = t ? /[，。？！：“”‘’（）《》、\-\:；—\(\)→\s0-9\.…\/a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùüǖǘǚǜ\u3000]/.test(t) : false;
                
                if (t && isPunc) {
                    let visualText = t === ' ' ? '空格' : (t.trim() === '' ? '全角空' : t);
                    res += `<div style="display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 44px; height: 44px; border: 1px dashed #e2e8f0; background: #f8fafc; border-radius: 4px;"><span style="font-size: 8px; color: #cbd5e1;">留空</span><span style="font-size:13px; font-weight:bold; color:#64748b;">${visualText}</span></div>`;
                } else if (t) {
                    const p = pys[pIdx] || '<span style="color:#ef4444; font-weight:bold;">缺音</span>';
                    res += `<div style="display: inline-flex; flex-direction: column; align-items: center; justify-content: space-between; width: 52px; height: 48px; border: 1px solid #cbd5e1; background: #f1f5f9; padding: 4px 2px; border-radius: 4px; box-sizing: border-box;"><span style="font-size: 9px; color: #2563eb; width:100%; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p}</span><span style="font-size: 14px; font-weight: bold; color: #1e293b;">${t}</span></div>`;
                    pIdx++;
                } else {
                    const p = pys[pIdx] || '';
                    if (p) {
                        res += `<div style="display: inline-flex; flex-direction: column; align-items: center; justify-content: space-between; width: 52px; height: 48px; border: 1px solid #ef4444; background: #fef2f2; padding: 4px 2px; border-radius: 4px; box-sizing: border-box;"><span style="font-size: 9px; color: #dc2626; font-weight: bold;">${p}</span><span style="font-size: 10px; color: #dc2626; font-weight: bold;">多余音</span></div>`;
                        pIdx++;
                    }
                }
            }
            res += `</div>`;
            return res;
        }

        if (typeof poemData !== 'undefined') {
            html += `<div style="padding: 10px; background: #eff6ff; border-radius: 8px; margin-bottom: 20px;"><strong style="color:#1e40af; font-size:15px;">📖 数据包一：古文原文段落排查 (poemData)</strong>`;
            let fullText = ""; let fullPy = "";
            poemData.forEach(w => {
                if(w.punc) { fullText += w.text; } 
                else { fullText += w.text; fullPy += (w.py || '') + " "; }
            });
            html += makeGridHtml("全文连缀核对", fullText, fullPy) + `</div>`;
        }

        if (typeof translationData !== 'undefined') {
            html += `<div style="padding: 10px; background: #f0fdf4; border-radius: 8px; margin-bottom: 20px;"><strong style="color:#166534; font-size:15px;">📖 数据包二：白话翻译段落排查 (translationData)</strong>`;
            translationData.forEach((item, idx) => {
                html += makeGridHtml(`第 ${idx + 1} 段译文`, item.zh, item.py);
            });
            html += `</div>`;
        }

        if (typeof analysisData !== 'undefined') {
            html += `<div style="padding: 10px; background: #faf5ff; border-radius: 8px; margin-bottom: 20px;"><strong style="color:#6b21a8; font-size:15px;">📖 数据包三：全诗赏析段落排查 (analysisData)</strong>`;
            analysisData.forEach((item, idx) => {
                html += makeGridHtml(`卡片 ${idx + 1} 标题区域`, item.header, item.headerPy);
                html += makeGridHtml(`卡片 ${idx + 1} 正文区域`, item.textZh, item.textPy);
            });
            html += `</div>`;
        }

        if (typeof quizQuestions !== 'undefined') {
            html += `<div style="padding: 10px; background: #fff1f2; border-radius: 8px; margin-bottom: 20px;"><strong style="color:#9f1239; font-size:15px;">📖 数据包四：客观选择题排查 (quizQuestions)</strong>`;
            quizQuestions.forEach((q, qIdx) => {
                html += makeGridHtml(`题号 ${q.id} 题干主干`, q.text, q.py);
                q.options.forEach((opt, oIdx) => {
                    const letters = ['A', 'B', 'C', 'D'];
                    html += makeGridHtml(`题目 ${q.id} - 选项 ${letters[oIdx]} 内容`, opt.text, opt.py);
                    if(opt.explanation) {
                        html += makeGridHtml(`题目 ${q.id} - 选项 ${letters[oIdx]} 底部解析`, opt.explanation, opt.explanationPy);
                    }
                });
            });
            html += `</div>`;
        }

        if (typeof shortQData !== 'undefined') {
            html += `<div style="padding: 10px; background: #fff7ed; border-radius: 8px; margin-bottom: 20px;"><strong style="color:#9a3412; font-size:15px;">📖 数据包五：简答题特训排查 (shortQData)</strong>`;
            shortQData.forEach((item, idx) => {
                html += makeGridHtml(`简答题 ${item.id} 题干主干`, item.qZh, item.qPy);
                item.sZh.forEach((line, lIdx) => {
                    const linePy = item.sPy && item.sPy[lIdx] ? item.sPy[lIdx] : '';
                    html += makeGridHtml(`简答题 ${item.id} - 思路步骤 ${lIdx + 1}`, line, linePy);
                });
                html += makeGridHtml(`简答题 ${item.id} - 官方标准答案`, item.aZh, item.aPy);
            });
            html += `</div>`;
        }

        container.innerHTML = html;
    }

    window.onload = function() {
        if (typeof quizQuestions !== 'undefined') {
            originalQuizQuestions = JSON.parse(JSON.stringify(quizQuestions));
        }
        renderPoem();
        renderTranslation();
        renderAnalysis();
        renderShortQ();
        renderQuizCards(); 
        initInteractions();
        
        // 生成数据，但由于容器 display:none，页面上不会显示
        renderDebugGrid();

        // 🎯【核心接头暗号逻辑】：在键盘上同时按下 Ctrl + M 键，隐藏的格子面板就会弹出来！再按一次就收起！
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'm' || e.key === 'M')) {
                e.preventDefault();
                const panel = document.getElementById('debug-checker-panel');
                if (panel.style.display === 'none') {
                    panel.style.display = 'block';
                    panel.scrollIntoView({ behavior: 'smooth' }); // 平滑滚动到格子区
                } else {
                    panel.style.display = 'none';
                }
            }
        });
    };

    function renderPoem() {
        const container = document.getElementById('dynamic-poem-container');
        let html = '<div class="poem-paragraph">&emsp;&emsp;'; 
        poemData.forEach(w => {
            if(w.punc) {
                html += `<span class="punctuation">${w.text.trim()}</span>`;
            } else {
                let examClass = w.exam ? ' word exam-focus' : ' word';
                let examAttr = w.exam ? ' data-exam="true"' : '';
                html += `<span class="${examClass}" data-text="${w.text.trim()}" data-pinyin="${w.py}" data-zh="${w.zh}" data-en="${w.en}"${examAttr}>${alignText(w.text, w.py)}</span>`;
            }
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function renderTranslation() {
        const container = document.getElementById('translationContent');
        let html = '';
        translationData.forEach((item, index) => {
            if(index > 0) html += '<div class="trans-divider"></div>';
            html += `
                <div class="trans-text-line">
                    <div class="trans-zh">${alignText(item.zh, item.py)}</div>
                    <div class="trans-en">${item.en}</div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function renderAnalysis() {
        const container = document.getElementById('analysis-content');
        let html = '';
        analysisData.forEach(item => {
            html += `
                <div class="analysis-card">
                    <div class="ana-title-group">
                        <h4 class="ana-header">${alignText(item.header, item.headerPy)}</h4>
                        <div class="ana-en">${item.en}</div>
                    </div>
                    <div class="ana-text-group">
                        <p class="ana-zh">${alignText(item.textZh, item.textPy)}</p>
                        <div class="ana-en">${item.textEn}</div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function renderShortQ() {
        const container = document.getElementById('shortq-content');
        if (!container) return;
        let html = '';
        shortQData.forEach(item => {
            let strategyZhHtml = '';
            
            item.sZh.forEach((lineText, lineIdx) => {
                if(lineIdx > 0) strategyZhHtml += '<br>';
                const linePy = item.sPy && item.sPy[lineIdx] ? item.sPy[lineIdx] : '';
                strategyZhHtml += `<span class="strategy-step-line">${alignText(lineText, linePy)}</span>`;
            });

            html += `
                <div class="sa-card">
                    <div class="sa-q-header">
                        <div class="sa-q-num-box">
                            <span class="sa-q-num">${item.id}</span>
                        </div>
                        <div class="q-text-group">
                            <h4 class="q-zh">${alignText(item.qZh, item.qPy)}</h4>
                        </div>
                    </div>
                    <div class="q-en">${item.qEn}</div>
                    <div class="strategy-box">
                        <div class="strategy-title">💡 答题思路</div>
                        <div class="strategy-zh" style="display: block !important; line-height: 2.6 !important;">${strategyZhHtml}</div>
                        <div class="strategy-en">${item.sEn}</div>
                    </div>
                    <button class="sa-answer-btn" onclick="toggleAnswer(this)">📖 点击查看标准答案</button>
                    <div class="sa-answer-box">
                        <div class="sa-model-answer">
                            <div class="sa-badge">标准答案</div>
                            <div class="sa-zh">${alignText(item.aZh, item.aPy)}</div>
                            <div class="sa-en">${item.aEn}</div>
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function renderQuizCards() {
        const container = document.getElementById('quiz-dynamic-container');
        if (!container || originalQuizQuestions.length === 0) return;
        container.innerHTML = '';
        
        const currentQuestions = JSON.parse(JSON.stringify(originalQuizQuestions));
        
        currentQuestions.forEach(q => {
            shuffleArray(q.options); 
            
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.setAttribute('data-qid', q.id);
            let optionsHtml = '';
            const letters = ['A.', 'B.', 'C.', 'D.'];
            
            q.options.forEach((opt, idx) => {
                const optLetter = letters[idx];
                optionsHtml += `
                    <button class="option-btn" data-correct="${opt.correct}" data-explanation-correct="${opt.correct ? opt.explanation : ''}" data-explanation-correct-py="${opt.correct ? opt.explanationPy : ''}" data-explanation-correct-en="${opt.correct ? opt.explanationEn : ''}" data-explanation-wrong="${!opt.correct ? opt.explanation : ''}" data-explanation-wrong-py="${!opt.correct ? opt.explanationPy : ''}" data-explanation-wrong-en="${!opt.correct ? opt.explanationEn : ''}" data-opt-text="${opt.text}" data-opt-py="${opt.py}" data-opt-en="${opt.en}">
                        <div class="opt-zh">
                            ${alignTextWithPrefix(optLetter, opt.text, opt.py)}
                        </div>
                        <div class="quiz-option-en">
                            ${opt.en}
                        </div>
                    </button>`;
            });
            
            card.innerHTML = `
                <div class="question-header">
                    <div class="q-zh-wrapper">
                        ${alignTextWithPrefix(q.id + '.', q.text, q.py)}
                    </div>
                    <div class="q-en">
                        ${q.en}
                    </div>
                </div>
                <div class="options-area">${optionsHtml}</div>
                <div class="feedback"></div>`;
            container.appendChild(card);
            
            const optsDiv = card.querySelector('.options-area');
            const btns = optsDiv.querySelectorAll('.option-btn');
            const fbDiv = card.querySelector('.feedback');
            btns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    if (this.disabled) return;
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    const correctBtn = Array.from(btns).find(b => b.getAttribute('data-correct') === 'true');
                    const correctOptText = correctBtn ? correctBtn.getAttribute('data-opt-text') : '正确选项';
                    const correctOptPy = correctBtn ? correctBtn.getAttribute('data-opt-py') : '';
                    const correctOptEn = correctBtn ? correctBtn.getAttribute('data-opt-en') : '';
                    
                    btns.forEach(b => b.disabled = true);
                    if (isCorrect) {
                        this.classList.add('correct');
                        const explanation = this.getAttribute('data-explanation-correct');
                        const explanationPy = this.getAttribute('data-explanation-correct-py');
                        const explanationEn = this.getAttribute('data-explanation-correct-en');
                        fbDiv.className = 'feedback success';
                        fbDiv.innerHTML = `
                            <div class="fb-line"><span class="fb-label success-txt">✅ 回答正确！</span></div>
                            <div class="fb-line"><span class="fb-label">📖 正确解析：</span><span class="fb-content">${alignText(explanation, explanationPy)}</span></div>
                            <div class="fb-en">💬 Correct Explanation: ${explanationEn}</div>`;
                    } else {
                        this.classList.add('wrong');
                        const wrongExp = this.getAttribute('data-explanation-wrong');
                        const wrongExpPy = this.getAttribute('data-explanation-wrong-py');
                        const wrongExpEn = this.getAttribute('data-explanation-wrong-en');
                        
                        const correctExp = correctBtn ? correctBtn.getAttribute('data-explanation-correct') : "";
                        const correctExpPy = correctBtn ? correctBtn.getAttribute('data-explanation-correct-py') : "";
                        const correctExpEn = correctBtn ? correctBtn.getAttribute('data-explanation-correct-en') : "";
                        
                        fbDiv.className = 'feedback error';
                        fbDiv.innerHTML = `
                            <div class="fb-line"><span class="fb-label error-txt">❌ 回答错误。正确答案是：</span><span class="fb-content-main">${correctOptText}</span></div>
                            <div class="fb-en">💬 Correct Answer: ${correctOptEn}</div>
                            <div class="fb-line" style="margin-top: 8px;"><span class="fb-label">📖 你选择的选项 analysis：</span><span class="fb-content">${alignText(wrongExp, wrongExpPy)}</span></div>
                            <div class="fb-en">💬 Your Choice Analysis: ${wrongExpEn}</div>
                            <div class="fb-line" style="margin-top: 8px;"><span class="fb-label">📖 正确选项解析：</span><span class="fb-content">${alignText(correctExp, correctExpPy)}</span></div>
                            <div class="fb-en">💬 Correct Option Analysis: ${correctExpEn}</div>`;
                    }
                });
            });
        });
    }

    function initInteractions() {
        const translationHeader = document.getElementById('translationHeader');
        const translationContent = document.getElementById('translationContent');
        const toggleIcon = document.getElementById('toggleIcon');
        translationHeader.addEventListener('click', function() {
            if (translationContent.classList.contains('show')) {
                translationContent.classList.remove('show');
                toggleIcon.textContent = '▶';
            } else {
                translationContent.classList.add('show');
                toggleIcon.textContent = '▼';
            }
        });
        
        const pinyinToggle = document.getElementById('pinyin-toggle');
        const enToggle = document.getElementById('en-toggle');
        
        document.body.classList.add('hide-pinyin', 'hide-english');
        pinyinToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-pinyin'); 
            else document.body.classList.add('hide-pinyin'); 
        });
        enToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-english'); 
            else document.body.classList.add('hide-english'); 
        });

        const words = document.querySelectorAll('.word');
        const tooltip = document.getElementById('tooltip');
        const dispWord = document.getElementById('disp-word');
        const dispPinyin = document.getElementById('disp-pinyin');
        const dispZh = document.getElementById('disp-zh');
        const dispEn = document.getElementById('disp-en');
        const examTag = document.getElementById('exam-tag');
        
        words.forEach(word => {
            word.addEventListener('click', function(e) {
                e.stopPropagation();
                words.forEach(w => w.classList.remove('active'));
                this.classList.add('active');
                
                dispWord.innerText = this.getAttribute('data-text');
                dispPinyin.innerText = this.getAttribute('data-pinyin');
                dispZh.innerHTML = `<strong>解析：</strong> ${this.getAttribute('data-zh')}`;
                dispEn.innerText = this.getAttribute('data-en');
                examTag.style.display = (this.getAttribute('data-exam') === 'true') ? 'inline-block' : 'none';
                
                tooltip.style.display = 'block';
                const rect = this.getBoundingClientRect();
                tooltip.style.top = `${rect.top + window.scrollY - tooltip.offsetHeight - 20}px`;
                tooltip.style.left = `${rect.left + window.scrollX + rect.width/2}px`;
                setTimeout(() => tooltip.classList.add('show'), 10);
            });
        });
        
        document.addEventListener('click', function(e) {
            if (!tooltip.contains(e.target) && !e.target.closest('.word')) {
                tooltip.classList.remove('show');
                words.forEach(w => w.classList.remove('active'));
                setTimeout(() => { if (!tooltip.classList.contains('show')) tooltip.style.display = 'none'; }, 300);
            }
        });

        const panels = [
            { btnId: 'toggle-analysis-btn', contentId: 'analysis-content', defaultHTML: '<span class="btn-icon">📜</span> 展开全诗赏析', defaultBg: 'linear-gradient(135deg, #10b981, #059669)' },
            { btnId: 'toggle-quiz-btn', contentId: 'quiz-content', defaultHTML: '<span class="btn-icon">🎯</span> 客观题自测', defaultBg: 'linear-gradient(135deg, #3b82f6, #2563eb)' },
            { btnId: 'toggle-shortq-btn', contentId: 'shortq-content', defaultHTML: '<span class="btn-icon">✍️</span> 简答题特训', defaultBg: 'linear-gradient(135deg, #8b5cf6, #6d28d9)' }
        ];
        
        panels.forEach(panel => {
            const btn = document.getElementById(panel.btnId);
            btn.addEventListener('click', function() {
                const content = document.getElementById(panel.contentId);
                const isOpen = content.style.display === 'block';
                
                panels.forEach(p => {
                    document.getElementById(p.contentId).style.display = 'none';
                    const pb = document.getElementById(p.btnId);
                    pb.innerHTML = p.defaultHTML;
                    pb.style.background = p.defaultBg;
                });
                
                if (!isOpen) { 
                    content.style.display = 'block'; 
                    btn.innerHTML = '<span class="btn-icon">⬆️</span> 收起当前面板并重置题目'; 
                    btn.style.background = '#64748b';
                    
                    if (panel.btnId === 'toggle-quiz-btn') {
                        renderQuizCards();
                    }
                } else {
                    if (panel.btnId === 'toggle-quiz-btn') {
                        renderQuizCards();
                    }
                }
            });
        });
    }

    function toggleAnswer(btn) {
        const answerBox = btn.nextElementSibling;
        if (answerBox.style.display === 'block') {
            answerBox.style.display = 'none';
            btn.innerHTML = '📖 点击查看标准答案';
        } else {
            answerBox.style.display = 'block';
            btn.innerHTML = '📖 收起答案';
        }
    }
</script>
</body>
</html>
